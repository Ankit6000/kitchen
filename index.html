<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Emoji&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TTM Kitchen" />

    <!-- Google meta tags -->
    <title>TTM Kitchen</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Type two emoji, browse mashups instantly, and copy share-ready mashups from TTM Kitchen."
    />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- OpenGraph tags -->
    <meta
      property="og:title"
      content="TTM Kitchen"
    />
    <meta property="og:image" content="/social.png" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="Pick two emoji, open a sticker-style tray of mashups, and tap any result to copy it fast."
    />

    <!-- Twitter tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/social.png" />
    <meta
      name="twitter:title"
      content="TTM Kitchen"
    />
    <meta
      name="twitter:description"
      content="An iPhone-friendly emoji mixer for browsing and copying mashups fast."
    />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/branding/ttm-kitchen-app-icon.png"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body style="margin: 0">
    <div id="root"></div>
    <script type="text/javascript">
      if (window.self !== window.top) {
        window.top.location.href =
          "https://en.wikipedia.org/wiki/Special:Random";
      }
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
